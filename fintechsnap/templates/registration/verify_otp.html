{% extends "base.html" %}

{% block title %}Verify Email — FinMentor{% endblock %}

{% block content %}
<div class="bg-gray-50 flex items-start justify-center px-6 pt-6 pb-6">
  <div class="bg-[#fff3e6] border border-gray-800 rounded-[28px] px-8 py-8 shadow-sm max-w-md w-full self-center">
    <h2 class="text-2xl font-bold text-slate-800 mb-3">Verify Your Email</h2>
    <p class="text-sm text-gray-700 mb-6">
      Enter the 6-digit OTP sent to
      <span class="font-semibold">{{ email }}</span>.
      The code expires in 10 minutes.
    </p>

    <form method="post" novalidate>
      {% csrf_token %}

      <label for="otp" class="block font-medium text-gray-700 mb-1">OTP Code</label>
      <input
        id="otp"
        name="otp"
        type="text"
        maxlength="6"
        inputmode="numeric"
        pattern="[0-9]{6}"
        value="{{ form.otp.value|default:'' }}"
        class="w-full px-4 py-3 mb-4 rounded-full border border-gray-400 focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none tracking-[0.35em]"
        placeholder="123456"
        required
      />
      <div class="text-red-600 text-sm mb-3">
        {{ form.otp.errors }}
      </div>

      <button
        type="submit"
        style="background-color:#9370DB"
        class="w-full mt-2 py-3 text-white font-semibold rounded-lg shadow-md hover:opacity-90 transition">
        Verify & Create Account
      </button>
    </form>

    <p class="mt-5 text-sm text-gray-600">
      Entered the wrong email?
      <a href="{% url 'register' %}" class="text-indigo-600 font-semibold hover:underline">Register again</a>
    </p>
  </div>
</div>
{% endblock %}
