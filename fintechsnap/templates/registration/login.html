{% extends "base.html" %}
{% load static %}

{% block title %}Login — FinMentor{% endblock %}

{% block content %}

<div class="relative bg-[#fff3e6] overflow-hidden flex justify-center px-6 py-16">

  <div class="relative z-10 max-w-md w-full bg-white rounded-[32px] border-2 border-brown px-10 py-12">

    <h2 class="text-2xl font-semibold text-gray-900 mb-8">Sign in</h2>

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}

      {% if messages %}
        {% for message in messages %}
          <div class="mb-4 text-red-600 text-sm">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}

      <input
        type="text"
        name="username"
        placeholder="Enter your username"
        class="w-full px-5 py-3 mb-6 rounded-full border border-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-300"
        required
      />

      <input
        type="password"
        name="password"
        placeholder="Enter your password"
        class="w-full px-5 py-3 mb-8 rounded-full border border-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-300"
        required
      />
      <div class="text-right mb-6">
        <a href="{% url 'password_reset' %}" class="text-sm font-semibold text-orange-600 hover:underline">
          Forgot password?
        </a>
      </div>
      <button
        type="submit"
        class="w-full py-3 rounded-full font-semibold text-gray-900
               bg-gradient-to-r from-yellow-300 to-orange-400
               hover:from-yellow-400 hover:to-orange-500 transition">
        Log in
      </button>
    </form>

    <p class="mt-6 text-sm text-center text-gray-700">
      Don’t have an account?
      <a href="{% url 'register' %}" class="font-semibold underline">
        Register here
      </a>
    </p>

  </div>
</div>

{% endblock %}
