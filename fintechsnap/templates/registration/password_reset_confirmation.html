{% extends "base.html" %}

{% block title %}Create New Password — FinMentor{% endblock %}

{% block content %}
<div class="relative bg-[#fff3e6] overflow-hidden flex justify-center px-6 py-16">
  <div class="relative z-10 max-w-md w-full bg-white rounded-[32px] border-2 border-brown px-10 py-12">
    <h2 class="text-2xl font-semibold text-gray-900 mb-4">Set a new password</h2>

    {% if validlink %}
      <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}

        <input
          type="password"
          name="new_password1"
          placeholder="Enter new password"
          class="w-full px-5 py-3 mb-4 rounded-full border border-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-300"
          required
        />

        <input
          type="password"
          name="new_password2"
          placeholder="Confirm new password"
          class="w-full px-5 py-3 mb-8 rounded-full border border-gray-400 focus:outline-none focus:ring-2 focus:ring-orange-300"
          required
        />

        <button
          type="submit"
          class="w-full py-3 rounded-full font-semibold text-gray-900 bg-gradient-to-r from-yellow-300 to-orange-400 hover:from-yellow-400 hover:to-orange-500 transition">
          Update password
        </button>
      </form>
    {% else %}
      <p class="text-sm text-red-600">This reset link is invalid or expired. Please request a new one.</p>
    {% endif %}
  </div>
</div>
{% endblock %}
